# Project-level Gradle settings.
# For more details on how to configure your build environment visit:
# http://www.gradle.org/guide/gradle_and_ant

# Specifies the JVM arguments used for the daemon process.
# The setting is particularly useful for headless machines with limited memory.
# Default value: -Xmx10248m -XX:MaxPermSize=256m
org.gradle.jvmargs=-Xmx2048m -XX:MaxPermSize=512m

# When set to true the Gradle daemon is used to build the project using all processors.
org.gradle.parallel=true

# AndroidX package structure to make it clearer which packages are being used
android.useAndroidX=true

# Enables namespacing of each library's R class so that its R class includes only the resources declared in the library itself and does not transitively include the resources declared in any library it depends on.
android.nonTransitiveRClass=true
